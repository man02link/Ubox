<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Box | Historial de Ventas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="ventas.css">
</head>

<body>

    <!-- Contenedor invisible para detectar el hover en la esquina superior derecha -->
    <div class="hover-header-container">
        <header class="main-header">
            <div class="header-content" style="display: flex; justify-content: flex-end; padding: 15px;">
                <nav class="nav-group">
                    <div class="dropdown" style="display: inline-block;">
                        <button class="btn dropdown-toggle" type="button" data-bs-toggle="dropdown"
                            aria-expanded="false"
                            style="background-color: #17a2b8; color: white; border: none; font-weight: bold; padding: 10px 15px; border-radius: 4px;">
                            ⚙️ Opciones
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                            <li><a class="dropdown-item" href="#">👤 Perfil</a></li>
                            <li><a class="dropdown-item" href="#">📊 Datos</a></li>
                            <li><a class="dropdown-item" href="carrito.html">🛒 Carrito</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()">🚪 Cerrar Sesión</a>
                            </li>
                        </ul>
                    </div>
                </nav>
            </div>
        </header>
    </div>

    <div class="sales-container">
        <header>
            <h1>📜 Historial de Ventas</h1>
            <nav>
                <a href="menu.html" class="btn-back">Volver al Menú</a>
            </nav>
        </header>

        <table class="inventory-table">
            <thead>
                <tr>
                    <th>Ticket ID</th>
                    <th>Fecha y Hora</th>
                    <th>Productos (Resumen)</th>
                    <th>Total Pagado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="sales-tbody">
                <tr>
                    <td colspan="5" style="text-align:center;">Cargando historial...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="auth.js"></script>
    <script src="ventas.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
