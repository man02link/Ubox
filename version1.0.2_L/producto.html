<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Contenedor invisible para detectar el hover en la esquina superior derecha -->
    <div class="hover-header-container">
        <header class="main-header">
            <div class="header-content" style="display: flex; justify-content: flex-end; padding: 15px;">
                <nav class="nav-group">
                    <div class="dropdown" style="display: inline-block;">
                        <button class="btn dropdown-toggle" type="button" data-bs-toggle="dropdown"
                            aria-expanded="false"
                            style="background-color: #17a2b8; color: white; border: none; font-weight: bold; padding: 10px 15px; border-radius: 4px;">
                            ⚙️ Opciones
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                            <li><a class="dropdown-item" href="#">👤 Perfil</a></li>
                            <li><a class="dropdown-item" href="#">📊 Datos</a></li>
                            <li><a class="dropdown-item" href="carrito.html">🛒 Carrito</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()">🚪 Cerrar Sesión</a>
                            </li>
                        </ul>
                    </div>
                </nav>
            </div>
        </header>
    </div>

    <header class="main-header">
        <div class="header-content">
            <h1>📦 Detalle del Producto</h1>
            <nav class="nav-group">
                <button onclick="window.location.href='catalogo.html'" class="btn-nav">← Volver al Catálogo</button>
                <button onclick="toggleSettings()" class="btn-nav" style="background-color: #555;">🎨 Temas</button>
            </nav>
        </div>
    </header>

    <main id="product-detail-container">
        <p id="loading-message">Cargando detalles del producto...</p>
    </main>

    <div id="cart-actions"
        style="max-width: 850px; margin: 20px auto; padding: 20px; background-color: var(--card-bg); border-radius: 8px; border: 1px solid #444; text-align: center;">
        <button onclick="window.location.href='carrito.html'" class="button"
            style="background-color: #28a745; font-weight: bold;">🛒 IR AL CARRITO</button>
    </div>

    <div id="settings-modal" class="modal" style="display: none;">
        <div class="modal-content card">
            <h3>🎨 Personalización de Vista</h3>
            <div class="field">
                <label>Color de Tema:</label>
                <select id="theme-select" onchange="changeTheme(this.value)">
                    <option value="light">Modo Claro</option>
                    <option value="dark">Modo Oscuro</option>
                    <option value="ocean">Océano Azul</option>
                    <option value="forest">Bosque Verde</option>
                </select>
            </div>
            <div class="field">
                <label>Tipo de Letra:</label>
                <select id="font-select" onchange="changeFont(this.value)">
                    <option value="-apple-system, BlinkMacSystemFont, 'Segoe UI'">Sistema</option>
                    <option value="'Georgia', serif">Serif</option>
                    <option value="'Courier New', monospace">Monospace</option>
                </select>
            </div>
            <button onclick="toggleSettings()" class="btn-primary"
                style="width: 100%; margin-top: 10px;">Cerrar</button>
        </div>
    </div>

    <script src="ui-settings.js"></script>
    <script src="producto.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
