
services:
  db:
    image: postgres:15-alpine
    container_name: postgres_dbUbox
    restart: always
    # Instrucción explícita para leer las variables del archivo de configuración .env
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: