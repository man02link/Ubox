<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Box | Nueva Renta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #1a1a1a; color: white;">

    <header class="main-header p-3 mb-4 border-bottom border-dark">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h3 m-0">🔑 Procesar Renta</h1>
            <a href="catalogo_rentas.html" class="btn btn-outline-light">← Volver al Catálogo</a>
        </div>
    </header>

    <div class="container">
        <div class="row">
            <div class="col-md-7">
                <div class="card bg-dark text-white border-secondary mb-4">
                    <div class="card-header border-secondary text-info fw-bold">
                        Datos del Cliente (Arrendatario)
                    </div>
                    <div class="card-body">
                        <form id="rental-form">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nombre Completo *</label>
                                    <input type="text" id="client_name" class="form-control bg-dark text-white border-secondary" required placeholder="Ej. Juan Pérez">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Matrícula / ID *</label>
                                    <input type="text" id="client_id_card" class="form-control bg-dark text-white border-secondary" required placeholder="Ej. AL123456">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Teléfono</label>
                                    <input type="tel" id="client_phone" class="form-control bg-dark text-white border-secondary" placeholder="Opcional">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Correo Institucional</label>
                                    <input type="email" id="client_email" class="form-control bg-dark text-white border-secondary" placeholder="Opcional">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-warning">Fecha de Devolución Pactada *</label>
                                <input type="datetime-local" id="date_end_plan" class="form-control bg-dark text-white border-secondary" required>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card bg-dark text-white border-secondary">
                    <div class="card-header border-secondary text-info fw-bold">
                        Equipos a Rentar
                    </div>
                    <div class="card-body">
                        <ul id="rental-items-list" class="list-group list-group-flush mb-3">
                            <li class="list-group-item bg-dark text-white text-center">Cargando equipos...</li>
                        </ul>
                        <div class="d-flex justify-content-between align-items-center mb-3 border-top border-secondary pt-3">
                            <h5 class="m-0">Total a Pagar:</h5>
                            <h4 class="m-0 text-success" id="rental-total">$0.00</h4>
                        </div>
                        <button type="button" class="btn btn-info w-100 fw-bold text-white" onclick="procesarRenta()">
                            ✅ Confirmar y Generar Contrato
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="carrito_rentas.js"></script>
</body>
</html>
