<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gimnasio | Trabajadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <style>
        body {
            background-color: #1e1e2f;
            color: white;
            padding: 20px;
        }

        h2, h4 {
            color: white !important;
        }

        .container-main {
            max-width: 1000px;
            margin: auto;
            background: #27293d;
            padding: 30px;
            border-radius: 10px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .data-table th,
        .data-table td {
            border: 1px solid #444;
            padding: 10px;
            text-align: left;
            color: white !important;
        }

        .data-table th {
            background: #32354f;
        }

        .btn-delete {
            background: #ff4b5c;
            border: none;
            padding: 5px 10px;
            color: white;
            border-radius: 4px;
        }

        .form-control {
            background-color: #1e1e2f !important;
            color: white !important;
            border-color: #444 !important;
        }
    </style>
</head>

<body>
    <div class="container-main">
        <a href="gym_dashboard.html" class="btn btn-secondary mb-3">⬅️ Volver</a>
        <h2> Gestión de Trabajadores</h2>

        <form id="worker-form" class="mt-4 p-4 rounded" style="background-color: #1e1e2f; border: 1px solid #444;">
            <h4 class="mb-3"> Registrar Nuevo Trabajador</h4>
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label text-white fw-bold">Nombre(s)</label>
                    <input type="text" id="w-name" class="form-control" placeholder="Nombre(s)" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white fw-bold">Apellidos</label>
                    <input type="text" id="w-lastname" class="form-control" placeholder="Apellidos">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white fw-bold">Teléfono</label>
                    <input type="text" id="w-phone" class="form-control" placeholder="Teléfono" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-white fw-bold">Sueldo Quincenal</label>
                    <input type="number" step="0.01" id="w-salary" class="form-control" placeholder="Sueldo Quincenal" required>
                </div>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold">Guardar Trabajador</button>
        </form>

        <h4 class="mt-5">Lista de Plantilla</h4>
        <div id="table-container"></div>
    </div>
    <script src="gym_trabajadores.js"></script>
</body>

</html>
