<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas | U-Box</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background-color: #1e1e2f;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 800px;
            width: 100%;
            padding: 20px;
        }

        .menu-card {
            background: #27293d;
            padding: 40px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            transition: transform 0.3s, background 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .menu-card:hover {
            transform: translateY(-10px);
            background: #32354f;
            color: white;
        }

        .menu-card h3 {
            margin-top: 15px;
            font-size: 1.8rem;
        }

        .icon {
            font-size: 5rem;
        }

        .logout-btn {
            margin-top: 40px;
            background: #ff4b5c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        .logout-btn:hover {
            background: #d43f4d;
        }
    </style>
</head>

<body>

    <!-- Contenedor invisible para detectar el hover en la esquina superior derecha -->
    <div class="hover-header-container">
        <header class="main-header">
            <div class="header-content" style="display: flex; justify-content: flex-end; padding: 15px;">
                <nav class="nav-group">
                    <div class="dropdown" style="display: inline-block;">
                        <button class="btn dropdown-toggle" type="button" data-bs-toggle="dropdown"
                            aria-expanded="false"
                            style="background-color: #17a2b8; color: white; border: none; font-weight: bold; padding: 10px 15px; border-radius: 4px;">
                            ⚙️ Opciones
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                            <li><a class="dropdown-item" href="#">👤 Perfil</a></li>
                            <li><a class="dropdown-item" href="#">📊 Datos</a></li>
                            <li><a class="dropdown-item" href="carrito.html">🛒 Carrito</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()">🚪 Cerrar Sesión</a>
                            </li>
                        </ul>
                    </div>
                </nav>
            </div>
        </header>
    </div>

    <h1 style="color: #ffffff; margin-bottom: 50px; margin-top: 80px;"> ¿Qué menu deseas?? </h1>
    <div></div>
    <div class="menu-container">
        <!-- 1. GIMNASIO -->
        <a href="gym_dashboard.html" class="menu-card">
            <span class="icon">🏋️‍♂️</span>
            <h3>Gimnasio</h3>
            <p style="font-size:1.1em; color:#aaa;">Administración del gimnasio</p>
        </a>

        <!-- 2. VENTAS -->
        <a href="menu_ventas.html" class="menu-card">
            <span class="icon">💰</span>
            <h3>Ventas e Inventario</h3>
            <p style="font-size:1.1em; color:#aaa;">Gestión de ventas e inventario</p>
        </a>

         <!-- 3. rentas -->
        <a href="catalogo_rentas.html" class="menu-card">
            <span class="icon">🗝️🏠</span>
            <h3>Rentas</h3>
            <p style="font-size:1.1em; color:#aaa;">Gestión de rentas</p>
        </a>
    </div>

    <script>
        // Protección de ruta (Igual que en las demás páginas)
        (function checkAuth() {
            const loggedIn = localStorage.getItem('isLoggedIn');
            if (!loggedIn) {
                window.location.href = 'login.html';
            }
        })();
    </script>

    <div style="margin-top:20px">
        <!-- Botón eliminado, se utiliza el dropdown -->
    </div>

    <script src="ui-settings.js"></script>
    <script src="menu.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
