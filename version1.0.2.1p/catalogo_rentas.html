<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>U-Box | Catálogo de Rentas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #1a1a1a; color: white;">

    <header class="p-3 border-bottom border-dark d-flex justify-content-between">
        <h2>🔑 Equipos Disponibles para Renta</h2>
        <div>
            <a href="publicar_renta.html" class="btn btn-warning">publicar</a>
            <a href="carrito_rentas.html" class="btn btn-warning">📋 Ver Lista de Renta (<span id="count-rent">0</span>)</a>
            <a href="historial_rentas.html" class="btn btn-warning">historial</a>
            <a href="menu.html" class="btn btn-outline-light">Menú</a>
        </div>
    </header>

    <div class="container mt-4">
        <div id="container-rentas" class="row g-4">
            </div>
    </div>

    <script>
        async function loadRentalCatalog() {
            const res = await fetch('http://localhost:3000/api/products-rent');
            const products = await res.json();
            const container = document.getElementById('container-rentas');

            container.innerHTML = products.map(p => `
                <div class="col-md-4">
                    <div class="card bg-dark text-white border-secondary h-100">
                        <div class="card-body">
                            <h5 class="card-title">${p.name}</h5>
                            <p class="text-muted small">S/N: ${p.serial_number}</p>
                            <p class="card-text">${p.description || ''}</p>
                            <h4 class="text-info">$${p.rental_price_day} <small style="font-size: 0.7rem;">/ día</small></h4>
                            <button onclick="addToRentalCart('${p.id}', '${p.name}', ${p.rental_price_day})" 
                                    class="btn btn-outline-info w-100 mt-2 ${p.status !== 'available' ? 'disabled' : ''}">
                                ${p.status === 'available' ? '➕ Agregar a Renta' : '🚫 No Disponible'}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToRentalCart(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('rentalCart') || '[]');
            
            // Evitar duplicados (un equipo de renta es único por su ID/Serie)
            if (cart.find(item => item.id === id)) {
                alert("Este equipo ya está en tu lista de renta.");
                return;
            }

            cart.push({ id, name, price, quantity: 1 });
            localStorage.setItem('rentalCart', JSON.stringify(cart));
            updateRentCount();
            alert(`${name} agregado a la lista de renta.`);
        }

        function updateRentCount() {
            const cart = JSON.parse(localStorage.getItem('rentalCart') || '[]');
            document.getElementById('count-rent').innerText = cart.length;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadRentalCatalog();
            updateRentCount();
        });
    </script>
</body>
</html>
