<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>U-Box | Panel de Control de Rentas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #1a1a1a; color: white;">

    <header class="p-3 border-bottom border-dark d-flex justify-content-between align-items-center">
        <h2 class="text-info">📊 Control de Equipos Rentados</h2>
        <div>
            <a href="catalogo_rentas.html" class="btn btn-outline-info">Catálogo</a>
            <a href="menu.html" class="btn btn-outline-light">Menú Principal</a>
        </div>
    </header>

    <div class="container-fluid mt-4">
        <div class="card bg-dark text-white border-secondary">
            <div class="card-header border-secondary d-flex justify-content-between">
                <span>Registro Maestro de Rentas</span>
                <span class="badge bg-info" id="total-active">0 Activas</span>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-dark table-hover border-secondary">
                        <thead>
                            <tr>
                                <th>Folio (Firma)</th>
                                <th>Cliente / Matrícula</th>
                                <th>Equipos</th>
                                <th>Entrega Pactada</th>
                                <th>Total</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="table-rentals-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="historial_rentas.js"></script>
</body>
</html>
