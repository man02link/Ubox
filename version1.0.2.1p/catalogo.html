<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

    <div class="hover-header-container">
        <header class="main-header">
            <div class="header-content" style="display: flex; justify-content: flex-end; padding: 15px;">
                <nav class="nav-group">
                    <div class="dropdown" style="display: inline-block;">
                        <button class="btn dropdown-toggle" type="button" data-bs-toggle="dropdown"
                            aria-expanded="false"
                            style="background-color: #17a2b8; color: white; border: none; font-weight: bold; padding: 10px 15px; border-radius: 4px;">
                            ⚙️ Opciones
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                            <li><a class="dropdown-item" href="#">👤 Perfil</a></li>
                            <li><a class="dropdown-item" href="#">📊 Datos</a></li>
                            <li><a class="dropdown-item" href="carrito.html">🛒 Carrito</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()">🚪 Cerrar Sesión</a>
                            </li>
                        </ul>
                    </div>
                </nav>
            </div>
        </header>
    </div>

    <header class="main-header">
        <div class="header-content">
            <h1>🛒 Catálogo de Productos</h1>
            <nav class="nav-group">
                <button onclick="window.location.href='index.html'" class="btn-nav"
                    style="background-color: #007bff; color: white;">📦 Inventario</button>
                <button onclick="window.location.href='entrada_mercancia.html'" class="btn-nav"
                    style="background-color: #007bff; color: white;">📦 Resurtir</button>
                <button onclick="window.location.href='nuevo_proveedor.html'" class="btn-nav"
                    style="background-color: #007bff; color: white;">🏭 Proveedores</button>
                <button onclick="window.location.href='carrito.html'"
                    style="background-color: #28a745; color: white; font-weight: bold; padding: 10px 15px; border-radius: 4px; border: none; cursor: pointer;">carrito</button>
                <button onclick="window.location.href='ventas.html'"
                    style="background-color: #28a745; color: white; font-weight: bold; padding: 10px 15px; border-radius: 4px; border: none; cursor: pointer;">ventas</button>

                <button onclick="toggleSettings()" class="btn-nav" style="background-color: #6c757d; color: white;">🎨
                    Temas</button>
                
                <button onclick="toggleExportModal()" class="btn-nav" 
                    style="background-color: #f39c12; color: white; font-weight: bold;">📥 Exportar</button>
            </nav>
        </div>
    </header>

    <main id="product-list">
        <p id="loading-message">Cargando productos...</p>
    </main>

    <div id="export-modal" class="modal" style="display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); justify-content: center; align-items: center;">
        <div class="modal-content card" style="background-color: #1a1a1a; padding: 30px; border-radius: 15px; width: 320px; text-align: center; border: 1px solid #444;">
            <h3 style="color: white; margin-bottom: 25px;">Seleccionar Formato</h3>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <button onclick="runExport('pdf')" class="btn" style="background-color: #e74c3c; color: white; padding: 10px;">📄 PDF (con fotos)</button>
                <button onclick="runExport('excel')" class="btn" style="background-color: #27ae60; color: white; padding: 10px;">📊 Excel (solo datos)</button>
            </div>
            <button onclick="toggleExportModal()" style="background:none; border:none; color:#888; margin-top:20px; cursor:pointer; text-decoration:underline;">Cancelar</button>
        </div>
    </div>

    <div id="settings-modal" class="modal"
        style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center;">
        <div class="modal-content card"
            style="background-color: var(--card-bg); padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            <h3 style="color: var(--text-main); margin-top: 0;">🎨 Personalización de Vista</h3>

            <div class="field" style="margin-bottom: 15px;">
                <label style="display: block; color: var(--text-main); margin-bottom: 5px;">Color de Tema:</label>
                <select id="theme-select" onchange="changeTheme(this.value)"
                    style="width: 100%; padding: 10px; border-radius: 4px; background: #333; color: white; border: 1px solid #444;">
                    <option value="dark">Modo Oscuro (Default)</option>
                    <option value="light">Modo Claro</option>
                    <option value="ocean">Océano Azul</option>
                    <option value="forest">Bosque Verde</option>
                </select>
            </div>

            <div class="field" style="margin-bottom: 15px;">
                <label style="display: block; color: var(--text-main); margin-bottom: 5px;">Tipo de Letra:</label>
                <select id="font-select" onchange="changeFont(this.value)"
                    style="width: 100%; padding: 10px; border-radius: 4px; background: #333; color: white; border: 1px solid #444;">
                    <option value="'Segoe UI', sans-serif">Sans Serif (Moderna)</option>
                    <option value="'Georgia', serif">Serif (Elegante)</option>
                    <option value="'Courier New', monospace">Monospace (Técnica)</option>
                </select>
            </div>

            <button onclick="toggleSettings()" class="btn-primary"
                style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Cerrar
                y Guardar</button>
        </div>
    </div>

    <script src="ui-settings.js"></script>
    <script src="catalogo.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
