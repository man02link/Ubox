<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración | Gimnasio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            background-color: #1e1e2f;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 900px;
            width: 100%;
            padding: 20px;
        }

        .menu-card {
            background: #27293d;
            padding: 40px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            transition: transform 0.3s, background 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .menu-card:hover {
            transform: translateY(-10px);
            background: #32354f;
            color: white;
        }

        .menu-card h3 {
            margin-top: 15px;
            font-size: 1.5rem;
        }

        .icon {
            font-size: 4rem;
        }
    </style>
</head>

<body>
    <div class="hover-header-container">
        <header class="main-header">
            <div class="header-content" style="display: flex; justify-content: flex-end; padding: 15px;">
                <nav class="nav-group">
                    <div class="dropdown" style="display: inline-block;">
                        <button class="btn dropdown-toggle" type="button" data-bs-toggle="dropdown"
                            aria-expanded="false"
                            style="background-color: #17a2b8; color: white; border: none; font-weight: bold; padding: 10px 15px; border-radius: 4px;">
                            Opciones
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                            <li><a class="dropdown-item" href="#">Perfil</a></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()">Cerrar Sesión</a>
                            </li>
                        </ul>
                    </div>
                </nav>
            </div>
        </header>
    </div>

    <h1 style="color: #ffffff; margin-bottom: 20px; margin-top: 80px;">Menú del Gimnasio</h1>
    <div style="margin-bottom: 40px;">
        <a href="menu.html" class="btn btn-secondary">Volver al Hub Principal</a>
    </div>

    <div class="menu-container">
        <!-- CLIENTES -->
        <a href="gym_clientes.html" class="menu-card">
            <span class="icon"></span>
            <h3>Clientes</h3>
            <p style="font-size:1em; color:#aaa;">Inscripciones y miembros</p>
        </a>

        <!-- TRABAJADORES -->
        <a href="gym_trabajadores.html" class="menu-card">
            <span class="icon"></span>
            <h3>Trabajadores</h3>
            <p style="font-size:1em; color:#aaa;">Gestión de personal</p>
        </a>

        <!-- PLANES -->
        <a href="gym_planes.html" class="menu-card">
            <span class="icon"></span>
            <h3>Planes</h3>
            <p style="font-size:1em; color:#aaa;">Membresías del gimnasio</p>
        </a>
    </div>

    <script src="ui-settings.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
