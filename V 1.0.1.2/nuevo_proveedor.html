<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Proveedor | Gestión de Almacén</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="admin-body">

    <header class="main-header">
        <div class="header-content">
            <h1>👤 Nuevo Proveedor</h1>
            <nav class="nav-group">
                <button onclick="window.location.href='menu.html'" class="btn-nav">🏠 Menú</button>
                <button onclick="window.location.href='proveedores.html'" class="btn-nav">📋
                    Directorio</button>
                <button onclick="toggleSettings()" class="btn-nav" style="background-color: #555;">🎨 Temas</button>
            </nav>
        </div>
    </header>

    <main class="dashboard-grid" style="display: flex; justify-content: center;">

        <section class="card supplier-card" style="max-width: 600px; width: 100%;">
            <div class="card-header">
                <h2 id="form-title">👤 Registrar Proveedor</h2>
            </div>
            <form id="supplier-form" class="vertical-form">
                <input type="hidden" id="supplier-id">

                <div class="field">
                    <label for="supplier-name">Nombre de la Empresa:</label>
                    <input type="text" id="supplier-name" placeholder="Razón Social" required>
                </div>

                <div class="field">
                    <label for="contact-name">Persona de Contacto:</label>
                    <input type="text" id="contact-name" placeholder="Ej: Juan Pérez">
                </div>

                <div class="grid-fields">
                    <div class="field">
                        <label for="supplier-phone">WhatsApp/Tel:</label>
                        <input type="tel" id="supplier-phone" placeholder="Ej: 5512345678">
                    </div>
                    <div class="field">
                        <label for="supplier-email">Email corporativo:</label>
                        <input type="email" id="supplier-email" placeholder="correo@ejemplo.com">
                    </div>
                </div>

                <div class="field">
                    <label for="supplier-address">Dirección Física (Maps):</label>
                    <textarea id="supplier-address" rows="2" placeholder="Calle, Número, Colonia..."></textarea>
                </div>

                <div class="button-actions">
                    <button type="submit" id="submit-button" class="btn-accent">Guardar Datos</button>
                    <button type="button" onclick="resetForm()" class="btn-secondary">Limpiar</button>
                </div>
            </form>
            <div id="restock-results" class="msg-box"></div> <!-- Reutilizamos para mensajes -->
        </section>

    </main>

    <div id="settings-modal" class="modal" style="display: none;">
        <div class="modal-content card">
            <h3>🎨 Personalización de Vista</h3>
            <div class="field">
                <label>Color de Tema:</label>
                <select id="theme-select" onchange="changeTheme(this.value)">
                    <option value="light">Modo Claro (Default)</option>
                    <option value="dark">Modo Oscuro</option>
                    <option value="ocean">Océano Azul</option>
                    <option value="forest">Bosque Verde</option>
                </select>
            </div>
            <div class="field">
                <label>Tipo de Letra:</label>
                <select id="font-select" onchange="changeFont(this.value)">
                    <option value="-apple-system, BlinkMacSystemFont, 'Segoe UI'">Sistema (Moderna)</option>
                    <option value="'Georgia', serif">Serif (Elegante)</option>
                    <option value="'Courier New', monospace">Monospace (Técnica)</option>
                </select>
            </div>
            <button onclick="toggleSettings()" class="btn-primary" style="width: 100%; margin-top: 10px;">Cerrar y
                Guardar</button>
        </div>
    </div>

    <script src="ui-settings.js"></script>
    <script src="proveedor.js"></script>
</body>

</html>
