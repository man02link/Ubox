<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* Estilos específicos que se adaptan al tema */
        .cart-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            color: var(--text-main);
        }
        .cart-table th, .cart-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            vertical-align: middle;
        }
        .cart-table th {
            background-color: rgba(0,0,0,0.2);
            color: var(--text-dim);
        }
        .cart-item-img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }
        .cart-actions {
            text-align: right;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <h1>🛒 Tu Carrito de Compras</h1>
            <nav class="nav-group">
                <button onclick="window.location.href='catalogo.html'" class="btn-nav">← Continuar Comprando</button>
                <button onclick="toggleSettings()" class="btn-nav" style="background-color: #555;">🎨 Temas</button>
            </nav>
        </div>
    </header>

    <main style="max-width: 900px; margin: 0 auto; background-color: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border);">
        <div id="cart-content">
            <p>Tu carrito está vacío.</p>
        </div>

        <div id="cart-summary" class="cart-actions"></div>
    </main>

    <div id="settings-modal" class="modal" style="display: none;">
        <div class="modal-content card">
            <h3>🎨 Personalización de Vista</h3>
            <div class="field">
                <label>Color de Tema:</label>
                <select id="theme-select" onchange="changeTheme(this.value)">
                    <option value="light">Modo Claro</option>
                    <option value="dark">Modo Oscuro</option>
                    <option value="ocean">Océano Azul</option>
                    <option value="forest">Bosque Verde</option>
                </select>
            </div>
            <div class="field">
                <label>Tipo de Letra:</label>
                <select id="font-select" onchange="changeFont(this.value)">
                    <option value="-apple-system, BlinkMacSystemFont, 'Segoe UI'">Sistema</option>
                    <option value="'Georgia', serif">Serif</option>
                    <option value="'Courier New', monospace">Monospace</option>
                </select>
            </div>
            <button onclick="toggleSettings()" class="btn-primary" style="width: 100%; margin-top: 10px;">Cerrar</button>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script src="ui-settings.js"></script>
    <script src="carrito.js"></script>
</body>
</html>
