<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body> 
    <header class="main-header">
        <div class="header-content">
            <h1>🛒 Catálogo de Productos</h1>
            <nav class="nav-group">
                <button onclick="window.location.href='menu.html'" class="btn-nav" style="background-color: #007bff; color: white;">Menu</button>
                <button onclick="window.location.href='index.html'" class="btn-nav" style="background-color: #007bff; color: white;">📦 Inventario</button>
                <button onclick="window.location.href='proveedores.html'" class="btn-nav" style="background-color: #007bff; color: white;">🏭 Proveedores</button>
                <button onclick="window.location.href='carrito.html'" style="background-color: #28a745; color: white; font-weight: bold; padding: 10px 15px; border-radius: 4px; border: none; cursor: pointer;">🛍️ MI CARRITO</button>
                
                <button onclick="toggleSettings()" class="btn-nav" style="background-color: #6c757d; color: white;">🎨 Temas</button>
                
                <button onclick="logout()" class="btn-nav" style="background-color: #007bff; color: white;">🚪 Cerrar Sesión</button>
            </nav>
        </div>
    </header>

    <main id="product-list">
        <p id="loading-message">Cargando productos...</p>
    </main>

    <div id="settings-modal" class="modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center;">
        <div class="modal-content card" style="background-color: var(--card-bg); padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            <h3 style="color: var(--text-main); margin-top: 0;">🎨 Personalización de Vista</h3>
            
            <div class="field" style="margin-bottom: 15px;">
                <label style="display: block; color: var(--text-main); margin-bottom: 5px;">Color de Tema:</label>
                <select id="theme-select" onchange="changeTheme(this.value)" style="width: 100%; padding: 10px; border-radius: 4px; background: #333; color: white; border: 1px solid #444;">
                    <option value="dark">Modo Oscuro (Default)</option>
                    <option value="light">Modo Claro</option>
                    <option value="ocean">Océano Azul</option>
                    <option value="forest">Bosque Verde</option>
                </select>
            </div>

            <div class="field" style="margin-bottom: 15px;">
                <label style="display: block; color: var(--text-main); margin-bottom: 5px;">Tipo de Letra:</label>
                <select id="font-select" onchange="changeFont(this.value)" style="width: 100%; padding: 10px; border-radius: 4px; background: #333; color: white; border: 1px solid #444;">
                    <option value="'Segoe UI', sans-serif">Sans Serif (Moderna)</option>
                    <option value="'Georgia', serif">Serif (Elegante)</option>
                    <option value="'Courier New', monospace">Monospace (Técnica)</option>
                </select>
            </div>

            <button onclick="toggleSettings()" class="btn-primary" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Cerrar y Guardar</button>
        </div>
    </div>

    <script src="ui-settings.js"></script>
    <script src="catalogo.js"></script>
</body>
</html>
