<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada de Mercancía | Gestión de Almacén</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="admin-body">

    <!-- Contenedor invisible para detectar el hover en la esquina superior derecha -->
    <div class="hover-header-container">
        <header class="main-header">
            <div class="header-content" style="display: flex; justify-content: flex-end; padding: 15px;">
                <nav class="nav-group">
                    <div class="dropdown" style="display: inline-block;">
                        <button class="btn dropdown-toggle" type="button" data-bs-toggle="dropdown"
                            aria-expanded="false"
                            style="background-color: #17a2b8; color: white; border: none; font-weight: bold; padding: 10px 15px; border-radius: 4px;">
                            ⚙️ Opciones
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                            <li><a class="dropdown-item" href="#">👤 Perfil</a></li>
                            <li><a class="dropdown-item" href="#">📊 Datos</a></li>
                            <li><a class="dropdown-item" href="carrito.html">🛒 Carrito</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="logout()">🚪 Cerrar Sesión</a>
                            </li>
                        </ul>
                    </div>
                </nav>
            </div>
        </header>
    </div>

    <header class="main-header">
        <div class="header-content">
            <h1>📥 Entrada de Mercancía</h1>
            <nav class="nav-group">
                <button onclick="window.location.href='menu.html'" class="btn-nav">🏠 Menú</button>
                <button onclick="window.location.href='index.html'" class="btn-nav">📦 Inventario</button>
                <button onclick="toggleSettings()" class="btn-nav" style="background-color: #555;">🎨 Temas</button>
            </nav>
        </div>
    </header>

    <main class="dashboard-grid" style="display: flex; justify-content: center;">

        <section class="card restock-card" style="max-width: 600px; width: 100%;">
            <div class="card-header">
                <h2>🚚 Registrar Entrada</h2>
            </div>
            <form id="restock-form" class="vertical-form">
                <div class="field">
                    <label for="restock-product-select">Producto:</label>
                    <select id="restock-product-select" required>
                        <option value="">Cargando productos...</option>
                    </select>
                </div>

                <div class="field">
                    <label for="restock-supplier-select">Proveedor (Opcional):</label>
                    <select id="restock-supplier-select">
                        <option value="">-- No especificar --</option>
                    </select>
                </div>

                <div class="field">
                    <label for="restock-quantity">Cantidad a añadir:</label>
                    <input type="number" id="restock-quantity" min="1" placeholder="Ej: 50" required>
                </div>

                <button type="submit" class="btn-primary full-width">
                    📥 Registrar y Generar PDF
                </button>
            </form>
            <div id="restock-results" class="msg-box"></div>
        </section>

    </main>

    <div id="settings-modal" class="modal" style="display: none;">
        <div class="modal-content card">
            <h3>🎨 Personalización de Vista</h3>
            <div class="field">
                <label>Color de Tema:</label>
                <select id="theme-select" onchange="changeTheme(this.value)">
                    <option value="light">Modo Claro (Default)</option>
                    <option value="dark">Modo Oscuro</option>
                    <option value="ocean">Océano Azul</option>
                    <option value="forest">Bosque Verde</option>
                </select>
            </div>
            <div class="field">
                <label>Tipo de Letra:</label>
                <select id="font-select" onchange="changeFont(this.value)">
                    <option value="-apple-system, BlinkMacSystemFont, 'Segoe UI'">Sistema (Moderna)</option>
                    <option value="'Georgia', serif">Serif (Elegante)</option>
                    <option value="'Courier New', monospace">Monospace (Técnica)</option>
                </select>
            </div>
            <button onclick="toggleSettings()" class="btn-primary" style="width: 100%; margin-top: 10px;">Cerrar y
                Guardar</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script src="ui-settings.js"></script>
    <script src="proveedor.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
